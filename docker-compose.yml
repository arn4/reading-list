services:
  reading-list:
    build:
      context: .
    image: reading-list-local:dev
    container_name: reading-list
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"
    volumes:
      - ./data:/data
      - ./app.py:/app/app.py:ro
      - ./auth.py:/app/auth.py:ro
      - ./metadata.py:/app/metadata.py:ro
      - ./static:/app/static:ro
