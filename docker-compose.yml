services:
  reading-list:
    image: "${IMAGE:-larna/reading-list:latest}"
    pull_policy: always
    container_name: reading-list
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${HOST_PORT:-8000}:${PORT:-8000}"
    volumes:
      - reading-list-data:/data

volumes:
  reading-list-data:
