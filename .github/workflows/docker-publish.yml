name: Docker Publish

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract app version
        id: version
        run: |
          VERSION=$(python - <<'PY'
          import re
          from pathlib import Path

          app = Path("app.py").read_text(encoding="utf-8")
          m = re.search(r'^VERSION\s*=\s*"([^"]+)"', app, flags=re.MULTILINE)
          if not m:
              raise SystemExit("Could not find VERSION in app.py")
          print(m.group(1))
          PY
          )
          echo "value=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Resolve Docker image name
        id: image
        env:
          DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "$DOCKERHUB_REPOSITORY" ]; then
            IMAGE="$DOCKERHUB_REPOSITORY"
          else
            IMAGE="$DOCKERHUB_USERNAME/reading-list"
          fi
          echo "name=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:v${{ steps.version.outputs.value }}
            ${{ steps.image.outputs.name }}:${{ github.sha }}
